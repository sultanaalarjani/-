# إعداد نشر تلقائي على Render — https://render.com
# الخطوات: New + → Blueprint → اختر هذا المستودع والفرع → Apply
services:
  - type: web
    name: perf-dashboard
    runtime: docker
    plan: free
    autoDeploy: true
    envVars:
      # رقم جوال مدير الإدارة (سجّلي الدخول به — الرمز يظهر على الشاشة في وضع العرض)
      - key: ADMIN_PHONE
        value: "0500000000"
      - key: ADMIN_NAME
        value: عبدالله الحزامي
      # الموقع يعمل عبر HTTPS على Render
      - key: COOKIE_SECURE
        value: "true"
      # النسخة النهائية: بدون بيانات تجريبية (تبدأ نظيفة وجاهزة للتعديل)
      - key: SEED_DEMO
        value: "false"
